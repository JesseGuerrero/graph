<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STORM - Article</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-gray-50 min-h-screen flex">
    <!-- Sidebar -->
    <aside id="sidebar" class="w-56 bg-slate-800 text-white min-h-screen flex flex-col fixed lg:static z-30 transition-transform -translate-x-full lg:translate-x-0">
        <div class="p-4">
            <a href="/static/index.html" class="block w-full bg-blue-600 hover:bg-blue-700 text-white text-center py-2.5 rounded-lg text-sm font-medium transition">
                + New Session
            </a>
        </div>
        <nav class="flex-1 px-3 space-y-1">
            <a href="/static/index.html" class="sidebar-link flex items-center gap-3 px-3 py-2.5 text-sm text-slate-300 hover:text-white transition">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                Discover
            </a>
            <a href="/static/library.html" class="sidebar-link flex items-center gap-3 px-3 py-2.5 text-sm text-slate-300 hover:text-white transition">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
                My Library
            </a>
        </nav>
        <div class="p-4 text-xs text-slate-500">STORM Wiki</div>
    </aside>

    <!-- Main -->
    <div class="flex-1 flex flex-col min-h-screen">
        <header class="bg-white border-b border-gray-200 px-6 py-3 flex items-center gap-4">
            <button onclick="toggleSidebar()" class="lg:hidden text-gray-500">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
            </button>
            <h1 class="text-lg font-bold text-slate-800">STORM</h1>
        </header>

        <main class="flex-1 px-8 py-6 max-w-6xl w-full mx-auto">
            <!-- Progress view (shown during generation) -->
            <div id="progress-view" class="hidden max-w-xl mx-auto pt-12">
                <h2 id="progress-topic" class="text-2xl font-bold text-slate-800 mb-8 text-center"></h2>
                <div id="steps" class="space-y-4">
                    <div class="step flex items-start gap-3" data-step="perspective">
                        <span class="step-icon mt-0.5 step-pending">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke-width="2"/></svg>
                        </span>
                        <div>
                            <p class="font-medium text-slate-700">Identifying perspectives</p>
                            <p class="text-sm text-slate-400 step-detail"></p>
                        </div>
                    </div>
                    <div class="step flex items-start gap-3" data-step="gathering">
                        <span class="step-icon mt-0.5 step-pending">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke-width="2"/></svg>
                        </span>
                        <div>
                            <p class="font-medium text-slate-700">Gathering information</p>
                            <p class="text-sm text-slate-400 step-detail"></p>
                        </div>
                    </div>
                    <div class="step flex items-start gap-3" data-step="outline">
                        <span class="step-icon mt-0.5 step-pending">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke-width="2"/></svg>
                        </span>
                        <div>
                            <p class="font-medium text-slate-700">Generating outline</p>
                            <p class="text-sm text-slate-400 step-detail"></p>
                        </div>
                    </div>
                    <div class="step flex items-start gap-3" data-step="writing">
                        <span class="step-icon mt-0.5 step-pending">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke-width="2"/></svg>
                        </span>
                        <div>
                            <p class="font-medium text-slate-700">Writing article</p>
                            <p class="text-sm text-slate-400 step-detail"></p>
                        </div>
                    </div>
                    <div class="step flex items-start gap-3" data-step="polishing">
                        <span class="step-icon mt-0.5 step-pending">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke-width="2"/></svg>
                        </span>
                        <div>
                            <p class="font-medium text-slate-700">Polishing</p>
                            <p class="text-sm text-slate-400 step-detail"></p>
                        </div>
                    </div>
                </div>
                <div id="error-msg" class="hidden mt-6 bg-red-50 border border-red-200 rounded-lg p-4 text-red-700 text-sm"></div>
            </div>

            <!-- Article view -->
            <div id="article-view" class="hidden">
                <div class="text-center mb-8">
                    <h2 id="article-title" class="text-3xl font-bold text-slate-800 mb-4"></h2>
                    <button id="brainstorm-btn" class="bg-slate-800 hover:bg-slate-700 text-white px-5 py-2 rounded-lg text-sm font-medium transition">
                        See BrainSTORMing Process
                    </button>
                </div>

                <div class="flex gap-8">
                    <!-- TOC -->
                    <nav id="toc" class="hidden lg:block w-56 shrink-0 sticky top-6 self-start toc-scroll max-h-[80vh] overflow-y-auto">
                        <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">Table of Contents</h3>
                        <div id="toc-list" class="space-y-1"></div>
                    </nav>
                    <!-- Article body -->
                    <div id="article-body" class="flex-1 bg-white rounded-xl border border-gray-200 p-8 article-content min-w-0"></div>
                </div>

                <!-- References -->
                <div id="references-section" class="hidden mt-8 bg-white rounded-xl border border-gray-200 p-8">
                    <h3 class="text-lg font-bold text-slate-800 mb-4">References</h3>
                    <div id="references-list" class="space-y-2 text-sm"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- BrainSTORMing Modal -->
    <div id="brainstorm-modal" class="hidden fixed inset-0 z-50 modal-backdrop flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-4xl max-h-[85vh] flex flex-col shadow-2xl">
            <div class="flex items-center justify-between px-6 py-4 border-b border-gray-200">
                <h3 class="text-lg font-bold text-slate-800">BrainSTORMing Process</h3>
                <button id="modal-close" class="text-slate-400 hover:text-slate-600 transition">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <!-- Persona tabs -->
            <div id="persona-tabs" class="flex gap-2 px-6 py-3 border-b border-gray-100 overflow-x-auto"></div>
            <!-- Conversation -->
            <div id="persona-content" class="flex-1 overflow-y-auto px-6 py-4 space-y-4"></div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
    <script src="/static/js/article.js"></script>
</body>
</html>
