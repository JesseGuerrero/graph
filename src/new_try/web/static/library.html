<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STORM - My Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-gray-50 min-h-screen flex">
    <!-- Sidebar -->
    <aside id="sidebar" class="w-56 bg-slate-800 text-white min-h-screen flex flex-col fixed lg:static z-30 transition-transform -translate-x-full lg:translate-x-0">
        <div class="p-4">
            <a href="/static/index.html" class="block w-full bg-blue-600 hover:bg-blue-700 text-white text-center py-2.5 rounded-lg text-sm font-medium transition">
                + New Session
            </a>
        </div>
        <nav class="flex-1 px-3 space-y-1">
            <a href="/static/index.html" class="sidebar-link flex items-center gap-3 px-3 py-2.5 text-sm text-slate-300 hover:text-white transition">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                Discover
            </a>
            <a href="/static/library.html" class="sidebar-link flex items-center gap-3 px-3 py-2.5 text-sm text-slate-300 hover:text-white transition">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
                My Library
            </a>
        </nav>
        <div class="p-4 text-xs text-slate-500">STORM Wiki</div>
    </aside>

    <!-- Main -->
    <div class="flex-1 flex flex-col min-h-screen">
        <header class="bg-white border-b border-gray-200 px-6 py-3 flex items-center gap-4">
            <button onclick="toggleSidebar()" class="lg:hidden text-gray-500">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
            </button>
            <h1 class="text-lg font-bold text-slate-800">STORM</h1>
        </header>

        <main class="flex-1 px-8 py-6 max-w-5xl w-full mx-auto">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-2xl font-bold text-slate-800">My Library</h2>
                <input id="search-input" type="text" placeholder="Search articles..."
                       class="border border-gray-200 rounded-lg px-4 py-2 text-sm outline-none focus:border-blue-300 w-64">
            </div>

            <!-- Tabs -->
            <div class="flex gap-1 mb-6 border-b border-gray-200">
                <button class="tab-btn px-4 py-2 text-sm font-medium border-b-2 border-blue-600 text-blue-600" data-filter="all">All</button>
                <button class="tab-btn px-4 py-2 text-sm font-medium border-b-2 border-transparent text-slate-500 hover:text-slate-700" data-filter="article">Articles</button>
                <button class="tab-btn px-4 py-2 text-sm font-medium border-b-2 border-transparent text-slate-500 hover:text-slate-700" data-filter="conversation">Conversations</button>
            </div>

            <!-- Article list -->
            <div id="article-list" class="space-y-3"></div>
            <div id="empty-state" class="hidden text-center py-16 text-slate-400">
                <p class="text-lg mb-2">No articles yet</p>
                <p class="text-sm">Create your first article from the <a href="/static/index.html" class="text-blue-500 hover:underline">home page</a></p>
            </div>
        </main>
    </div>

    <script src="/static/js/app.js"></script>
    <script src="/static/js/library.js"></script>
</body>
</html>
