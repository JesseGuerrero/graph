use_default_settings: true

server:
  secret_key: "storm-searxng-dev-key-change-in-prod"
  bind_address: "0.0.0.0"
  port: 8080

search:
  safe_search: 0
  formats:
    - html
    - json

outgoing:
  request_timeout: 10
  max_request_timeout: 15

engines:

  # === DISABLED: Aggressive rate limiters ===
  - name: google
    disabled: true
  - name: google news
    disabled: true

  # === HIGH WEIGHT: Tolerant general web engines ===
  - name: duckduckgo
    disabled: false
    weight: 3.0
    timeout: 10
  - name: brave
    disabled: false
    weight: 3.0
    timeout: 10
  - name: bing
    disabled: false
    weight: 2.5
    timeout: 10
  - name: mojeek
    disabled: false
    weight: 2.0
    timeout: 10
  - name: qwant
    disabled: false
    weight: 2.0
    timeout: 10
  - name: startpage
    disabled: false
    weight: 2.0
    timeout: 10

  # === NEWS: For current events and reporting ===
  - name: duckduckgo news
    disabled: false
    weight: 2.5
    timeout: 10
  - name: brave.news
    disabled: false
    weight: 2.5
    timeout: 10
  - name: bing news
    disabled: false
    weight: 2.0
    timeout: 10
  - name: mojeek news
    disabled: false
    weight: 2.0
    timeout: 10
  - name: qwant news
    disabled: false
    weight: 2.0
    timeout: 10
  - name: reuters
