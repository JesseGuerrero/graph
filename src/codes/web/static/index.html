<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STORM - Create an Article</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-gray-50 min-h-screen flex">
    <!-- Sidebar -->
    <aside id="sidebar" class="w-56 bg-slate-800 text-white min-h-screen flex flex-col fixed lg:static z-30 transition-transform -translate-x-full lg:translate-x-0">
        <div class="p-4">
            <a href="/static/index.html" class="block w-full bg-blue-600 hover:bg-blue-700 text-white text-center py-2.5 rounded-lg text-sm font-medium transition">
                + Deep Search
            </a>
        </div>
        <nav class="flex-1 px-3 space-y-1 overflow-hidden">
            <a href="/static/library.html" class="sidebar-link flex items-center gap-3 px-3 py-2.5 text-sm text-slate-300 hover:text-white transition">
                <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
                My Library
            </a>
            <div id="sidebar-history" class="mt-2 space-y-0.5"></div>
        </nav>
        <div class="p-4 text-xs text-slate-500">STORM Wiki</div>
    </aside>

    <!-- Main -->
    <div class="flex-1 flex flex-col min-h-screen">
        <!-- Top bar -->
        <header class="bg-white border-b border-gray-200 px-6 py-3 flex items-center gap-4">
            <button onclick="toggleSidebar()" class="lg:hidden text-gray-500">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
            </button>
            <h1 class="text-lg font-bold text-slate-800">STORM</h1>
            <div class="flex-1"></div>
            <button onclick="openSettings()" class="text-slate-400 hover:text-slate-600 transition" title="Settings">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
        </header>

        <!-- Content -->
        <main class="flex-1 flex flex-col px-6 py-6 overflow-hidden">
            <div class="flex items-center gap-4 mb-4">
                <input id="title-input" type="text" placeholder="Article title..."
                       class="text-xl font-bold text-slate-800 outline-none flex-1 bg-transparent border-b border-transparent focus:border-blue-300 pb-1 transition">
                <button id="save-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg text-sm font-medium transition flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                    Save Article
                </button>
            </div>
            <div class="flex flex-1 gap-4 overflow-hidden">
                <!-- Editor -->
                <div class="flex-1 flex flex-col min-w-0">
                    <div class="text-xs text-slate-400 mb-1 flex items-center justify-between">
                        <span>Markdown</span>
                        <button id="toggle-preview" class="text-blue-500 hover:text-blue-700 text-xs font-medium">Show Preview</button>
                    </div>
                    <textarea id="md-input" placeholder="Paste or type your markdown here..."
                              class="flex-1 w-full p-4 text-sm font-mono bg-white border border-gray-200 rounded-xl outline-none resize-none focus:border-blue-300 transition" spellcheck="false"></textarea>
                    <div id="md-preview" class="hidden flex-1 w-full p-4 text-sm bg-white border border-gray-200 rounded-xl overflow-y-auto prose prose-sm max-w-none"></div>
                </div>
                <!-- TOC -->
                <div class="w-56 flex-shrink-0">
                    <div class="text-xs text-slate-400 mb-1">Table of Contents</div>
                    <div id="toc" class="bg-white border border-gray-200 rounded-xl p-3 overflow-y-auto text-sm" style="max-height: calc(100vh - 180px);">
                        <p class="text-xs text-slate-300 italic">Headings will appear here...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="hidden fixed inset-0 z-50 modal-backdrop flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-lg shadow-2xl max-h-[85vh] overflow-y-auto">
            <div class="flex items-center justify-between px-6 py-4 border-b border-gray-200 sticky top-0 bg-white rounded-t-2xl z-10">
                <h3 class="text-base font-semibold text-slate-800">Configuration</h3>
                <button onclick="closeSettings()" class="text-slate-400 hover:text-slate-600">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <div class="px-6 py-4 space-y-4">
                <!-- LLM Provider -->
                <div>
                    <button onclick="toggleSection('sec-llm')" class="w-full flex items-center justify-between text-xs font-semibold text-slate-500 uppercase tracking-wider py-1">
                        LLM Provider (OpenAI-compatible) <span id="sec-llm-arrow" class="text-base">&minus;</span>
                    </button>
                    <div id="sec-llm" class="space-y-2 mt-2">
                        <input id="set-openai-url" type="text" placeholder="API URL (e.g. https://api.openai.com/v1)" class="settings-input">
                        <input id="set-openai-key" type="password" placeholder="API Key" class="settings-input">
                        <input id="set-openai-model" type="text" placeholder="Model name (e.g. gpt-4o)" class="settings-input">
                    </div>
                </div>
                <!-- Search Provider -->
                <div>
                    <button onclick="toggleSection('sec-search')" class="w-full flex items-center justify-between text-xs font-semibold text-slate-500 uppercase tracking-wider py-1">
                        Search Provider <span id="sec-search-arrow" class="text-base">&minus;</span>
                    </button>
                    <div id="sec-search" class="space-y-3 mt-2">
                        <label class="settings-radio"><input type="radio" name="search-provider" value="searxng" checked> SearXNG (self-hosted)</label>
                        <input id="set-searxng-url" type="text" placeholder="SearXNG URL (e.g. http://localhost:8888/search)" class="settings-input ml-5">
                        <label class="settings-radio"><input type="radio" name="search-provider" value="serper"> Serper (Google via API)</label>
                        <input id="set-serper-key" type="password" placeholder="Serper API Key" class="settings-input ml-5">
                        <label class="settings-radio ml-5"><input type="checkbox" id="set-serper-cache" checked> Serper: Cache search results locally</label>
                        <label class="settings-radio"><input type="radio" name="search-provider" value="duckduckgo"> DuckDuckGo (no key, snippets only)</label>
                        <label class="settings-radio opacity-40"><input type="radio" name="search-provider" value="brave" disabled> Brave Search (coming soon)</label>
                        <input id="set-brave-key" type="password" placeholder="Brave API Key" class="settings-input ml-5 opacity-40" disabled>
                    </div>
                </div>
                <!-- Extract Page -->
                <div>
                    <button onclick="toggleSection('sec-fetch')" class="w-full flex items-center justify-between text-xs font-semibold text-slate-500 uppercase tracking-wider py-1">
                        Extract Page <span id="sec-fetch-arrow" class="text-base">&minus;</span>
                    </button>
                    <div id="sec-fetch" class="mt-2 space-y-3">
                        <label class="settings-radio"><input type="radio" name="page-fetch" value="trafilatura" checked> Trafilatura (static HTML extraction)</label>
                        <label class="settings-label">Chunk Index Size (chars)<input id="set-chunk-size" type="number" class="settings-input" min="200" max="5000" step="100"></label>
                    </div>
                </div>
                <!-- Agent Parameters -->
                <div>
                    <button onclick="toggleSection('sec-pipeline')" class="w-full flex items-center justify-between text-xs font-semibold text-slate-500 uppercase tracking-wider py-1">
                        Agent Parameters <span id="sec-pipeline-arrow" class="text-base">&minus;</span>
                    </button>
                    <div id="sec-pipeline" class="mt-2 grid grid-cols-2 gap-x-4 gap-y-2">
                        <label class="settings-label">Judge Agents<input id="set-max-perspective" type="number" class="settings-input" min="1" max="20"></label>
                        <label class="settings-label">Debate Turns<input id="set-max-conv-turn" type="number" class="settings-input" min="1" max="20"></label>
                        <label class="settings-label">Search Top-K Web URLs Per Turn<input id="set-search-top-k" type="number" class="settings-input" min="1" max="20"></label>
                        <label class="settings-label">Retrieve Top-K Chunks Per Section<input id="set-retrieve-top-k" type="number" class="settings-input" min="1" max="50"></label>
                        <label class="settings-label">Section by Section Token Limit<input id="set-article-gen-tokens" type="number" class="settings-input" min="500" max="32000" step="500"></label>
                        <label class="settings-label">Polish Tokens<input id="set-article-polish-tokens" type="number" class="settings-input" min="500" max="32000" step="500"></label>
                        <label class="settings-label">Outline Tokens<input id="set-outline-gen-tokens" type="number" class="settings-input" min="200" max="8000" step="100"></label>
                        <label class="settings-radio col-span-2 mt-1"><input type="checkbox" id="set-include-images"> Meta Info Image Matching</label>
                    </div>
                </div>
                <!-- xAI -->
                <div>
                    <button onclick="toggleSection('sec-xai')" class="w-full flex items-center justify-between text-xs font-semibold text-slate-500 uppercase tracking-wider py-1">
                        xAI Twitter/X Search <span id="sec-xai-arrow" class="text-base">+</span>
                    </button>
                    <div id="sec-xai" class="hidden mt-2 space-y-2">
                        <label class="settings-radio"><input type="checkbox" id="set-xai-enabled"> Enable X/Twitter Search</label>
                        <label class="settings-label">xAI API Key<input id="set-xai-key" type="password" class="settings-input" placeholder="xai-..."></label>
                        <p class="text-xs text-slate-400">Adds an "X Investigator" persona that searches X/Twitter via Grok.</p>
                    </div>
                </div>
            </div>
            <div class="px-6 py-4 border-t border-gray-100 flex justify-end gap-3 sticky bottom-0 bg-white rounded-b-2xl">
                <button onclick="closeSettings()" class="px-4 py-2 text-sm text-slate-600 hover:text-slate-800">Cancel</button>
                <button onclick="saveSettings()" class="px-4 py-2 text-sm bg-slate-800 text-white rounded-lg hover:bg-slate-700 transition">Save</button>
            </div>
        </div>
    </div>

    <script src="/static/js/app.js?v=2"></script>
    <script src="/static/js/settings.js"></script>
    <script src="/static/js/home.js"></script>
</body>
</html>
